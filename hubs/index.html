<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>족장시대 허브</title>
<style>
:root{--gold:#f2c76f;--line:rgba(242,199,111,.36)}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(#07111b,#02060a);color:#f7efe0;font-family:system-ui,-apple-system,"Noto Sans KR","Apple SD Gothic Neo",sans-serif}
.wrap{max-width:980px;margin:0 auto;padding:20px 14px 92px}
.top{display:flex;justify-content:space-between;gap:10px;align-items:center}
button{border:1px solid var(--line);background:rgba(0,0,0,.35);color:#f7efe0;padding:10px 14px;border-radius:12px}
h1{color:var(--gold);font-size:30px;margin:24px 0 4px}
.sub{color:#fff;font-size:20px;margin-bottom:14px}
.hero{border:1px solid var(--line);border-radius:20px;overflow:hidden;background:#08131e;margin:18px 0}
.hero img{width:100%;display:block;min-height:180px;object-fit:cover}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.card{border:1px solid var(--line);background:rgba(255,255,255,.06);border-radius:18px;padding:16px}
.card h2{font-size:18px;color:var(--gold);margin:0 0 10px}
ul{margin:0;padding-left:18px;line-height:1.75}
.verse{font-size:20px;line-height:1.55;border-left:4px solid var(--gold);padding-left:14px;color:#fff5d8}
.bottom{position:fixed;left:0;right:0;bottom:0;background:rgba(2,8,13,.94);backdrop-filter:blur(10px);border-top:1px solid var(--line);padding:10px;display:flex;gap:8px;justify-content:center}
@media(max-width:720px){.grid{grid-template-columns:1fr}h1{font-size:26px}}
</style>
</head>
<body>
<div class="wrap">
<div class="top"><button onclick="location.href='../index.html'">← Matrix</button><button onclick="openList()">허브 목록</button></div>
<h1 id="title"></h1><div class="sub" id="subtitle"></div>
<div class="card verse" id="theme"></div>
<div class="hero"><img id="map" alt="허브 지도"/></div>
<div class="grid">
<section class="card"><h2>대표성구</h2><div class="verse" id="verse"></div></section>
<section class="card"><h2>핵심사건</h2><ul id="events"></ul></section>
<section class="card"><h2>핵심의미</h2><ul id="meaning"></ul></section>
<section class="card"><h2>연결탐험</h2><ul id="connections"></ul></section>
</div>
</div>
<div class="bottom"><button id="prevBtn">이전</button><button onclick="location.href='../index.html'">매트릭스로</button><button id="nextBtn">다음</button></div>
<script src="js/app.js"></script>
</body>
</html>
