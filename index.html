<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<title>족장시대 Matrix</title>
<link rel="manifest" href="./manifest.webmanifest"/>
<meta name="theme-color" content="#071017"/>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;background:#071017;color:#fff;font-family:system-ui,-apple-system,"Noto Sans KR","Apple SD Gothic Neo",sans-serif;overflow-x:hidden}
body{display:flex;justify-content:center}
.phone{position:relative;width:100%;max-width:560px;min-height:100svh;background:#071017;overflow:visible}
.stage{position:relative;width:100%;line-height:0;background:#071017;overflow:visible}
.bg{display:block;width:100%;height:auto;user-select:none;pointer-events:none}
.hot{position:absolute;z-index:10;border:0;background:rgba(255,255,255,0);border-radius:14px;cursor:pointer}
.hot:focus-visible{outline:2px solid #f7d889;background:rgba(247,216,137,.12)}
.hot.debug{background:rgba(247,216,137,.18);outline:1px solid rgba(247,216,137,.65)}

/* 사건 전체 클릭 영역 */
.e1{left:0.5%;top:8.5%;width:43.5%;height:15.5%}
.e2{left:0.5%;top:25.0%;width:43.5%;height:15.0%}
.e3{left:0.5%;top:41.1%;width:43.5%;height:15.0%}
.e4{left:0.5%;top:57.4%;width:43.5%;height:14.7%}
.e5{left:0.5%;top:73.1%;width:43.5%;height:13.4%}

/* 우측 허브 버튼 영역: 실제 아이콘/버튼 중심에 맞춤 */
.b1a{left:47.2%;top:20.35%;width:15.8%;height:2.95%}
.b1b{left:64.0%;top:20.35%;width:15.8%;height:2.95%}
.b1c{left:80.8%;top:20.35%;width:17.2%;height:2.95%}

.b2a{left:47.2%;top:36.48%;width:15.8%;height:2.95%}
.b2b{left:64.0%;top:36.48%;width:15.8%;height:2.95%}
.b2c{left:80.8%;top:36.48%;width:17.2%;height:2.95%}

.b3a{left:47.2%;top:52.70%;width:15.8%;height:2.95%}
.b3b{left:64.0%;top:52.70%;width:15.8%;height:2.95%}
.b3c{left:80.8%;top:52.70%;width:17.2%;height:2.95%}

/* 요셉: 기존보다 위쪽/왼쪽으로 당겨 실제 버튼 위에 맞춤 */
.b4a{left:47.2%;top:67.25%;width:15.8%;height:3.6%}
.b4b{left:64.0%;top:67.25%;width:15.8%;height:3.6%}
.b4c{left:80.8%;top:67.25%;width:17.2%;height:3.6%}

/* 애굽정착: 기존보다 위쪽으로 당겨 실제 버튼 위에 맞춤 */
.b5a{left:47.2%;top:82.75%;width:15.8%;height:3.7%}
.b5b{left:64.0%;top:82.75%;width:15.8%;height:3.7%}
.b5c{left:80.8%;top:82.75%;width:17.2%;height:3.7%}

/* 하단 메뉴 */
.nhome{left:2.0%;top:92.95%;width:15.5%;height:5.7%}
.nall{left:18.5%;top:92.95%;width:17.0%;height:5.7%}
.nhub{left:37.0%;top:92.95%;width:20.0%;height:5.7%}
.nprev{left:58.5%;top:92.95%;width:16.5%;height:5.7%}
.nnext{left:76.0%;top:92.95%;width:22.5%;height:5.7%}

.sheetBack{position:fixed;inset:0;background:rgba(0,0,0,.48);opacity:0;pointer-events:none;transition:.22s;z-index:40}
.sheetBack.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,105%);width:100%;max-width:560px;z-index:50;max-height:73svh;overflow:auto;background:linear-gradient(180deg,rgba(24,32,40,.98),rgba(6,11,17,.99));border:1px solid rgba(247,216,137,.28);border-bottom:0;border-radius:24px 24px 0 0;box-shadow:0 -24px 60px rgba(0,0,0,.55);padding:18px 18px calc(24px + env(safe-area-inset-bottom));transition:.26s}
.sheet.show{transform:translate(-50%,0)}
.grab{width:44px;height:5px;border-radius:999px;background:rgba(255,255,255,.26);margin:0 auto 14px}
.close{position:absolute;right:16px;top:16px;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,.23);background:rgba(255,255,255,.08);color:#fff;font-size:22px}
.sheet h2{margin:0 44px 5px 0;font-size:24px;color:#fff}
.sheet .meta{color:#f7d889;font-weight:950;font-size:14px;margin-bottom:12px}
.sheet p{margin:0 0 12px;color:rgba(255,255,255,.86);line-height:1.65;font-size:15px}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{border:1px solid rgba(247,216,137,.26);background:rgba(247,216,137,.08);color:#f8e4aa;border-radius:999px;padding:8px 11px;font-size:13px;font-weight:850}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(18px);max-width:min(92vw,500px);background:rgba(8,13,18,.92);border:1px solid rgba(247,216,137,.32);color:#ffe7aa;padding:10px 14px;border-radius:999px;font-size:13px;font-weight:850;opacity:0;transition:.22s;z-index:60}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Fixed footer v2: 배경과 분리된 붙박이 하단 레이어 */
:root{--matrix-footer-h:clamp(115px,31.93vw,179px);}
.main-content{padding-bottom:calc(var(--matrix-footer-h) + env(safe-area-inset-bottom) + 12px)!important;}
.stage{position:relative!important;width:100%!important;aspect-ratio:874/1520!important;overflow:hidden!important;margin:0 auto!important;background:#071017!important;}
.matrixCanvas{position:absolute!important;left:0!important;top:0!important;width:100%!important;aspect-ratio:874/1799!important;line-height:0!important;}
.fixedFooter{position:fixed!important;left:50%!important;bottom:0!important;transform:translateX(-50%)!important;width:100%!important;max-width:560px!important;z-index:90!important;line-height:0!important;background:#071017!important;padding-bottom:env(safe-area-inset-bottom)!important;box-shadow:0 -14px 34px rgba(0,0,0,.58)!important;}
.fixedFooter::before{content:"";position:absolute;left:0;right:0;top:-18px;height:18px;background:linear-gradient(180deg,rgba(7,16,23,0),rgba(7,16,23,.96));pointer-events:none;}
.footerBg{display:block;width:100%;height:auto;user-select:none;pointer-events:none;}
.footerHot{position:absolute;z-index:92;border:0;background:transparent;border-radius:14px;cursor:pointer;}
.footerHot:focus-visible{outline:2px solid #f7d889;background:rgba(247,216,137,.12);}
.fhome{left:2.0%;top:54.5%;width:15.5%;height:36.8%;}
.fall{left:18.5%;top:54.5%;width:17.0%;height:36.8%;}
.fhub{left:37.0%;top:54.5%;width:20.0%;height:36.8%;}
.fprev{left:58.5%;top:54.5%;width:16.5%;height:36.8%;}
.fnext{left:76.0%;top:54.5%;width:22.5%;height:36.8%;}
.toast{bottom:calc(var(--matrix-footer-h) + 16px)!important;}

</style>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
<div class="app-container">
<main class="phone main-content">
<section class="stage card-grid">
<div class="matrixCanvas">
<img class="bg" src="./assets/patriarch-main.png" alt="족장시대 Matrix"/>

<button class="hot e1" onclick="goHub('abraham')" aria-label="아브라함 허브"></button>
<button class="hot e2" onclick="goHub('isaac')" aria-label="이삭 허브"></button>
<button class="hot e3" onclick="goHub('jacob')" aria-label="야곱 허브"></button>
<button class="hot e4" onclick="goHub('joseph')" aria-label="요셉 허브"></button>
<button class="hot e5" onclick="goHub('egypt')" aria-label="애굽 정착 허브"></button>

<button class="hot b1a" onclick="goHub('abraham')"></button><button class="hot b1b" onclick="openSheet('abraham')"></button><button class="hot b1c" onclick="openSheet('covenant')"></button>
<button class="hot b2a" onclick="goHub('isaac')"></button><button class="hot b2b" onclick="openSheet('isaac')"></button><button class="hot b2c" onclick="openSheet('covenant')"></button>
<button class="hot b3a" onclick="goHub('jacob')"></button><button class="hot b3b" onclick="openSheet('jacob')"></button><button class="hot b3c" onclick="openSheet('covenant')"></button>
<button class="hot b4a" onclick="goHub('joseph')"></button><button class="hot b4b" onclick="openSheet('joseph')"></button><button class="hot b4c" onclick="openSheet('providence')"></button>
<button class="hot b5a" onclick="goHub('egypt')"></button><button class="hot b5b" onclick="openSheet('egypt')"></button><button class="hot b5c" onclick="openSheet('exodus')"></button>
</div>
</section>
</main>
<nav class="fixedFooter" aria-label="족장시대 하단 고정 메뉴">
  <img class="footerBg" src="./assets/patriarch-fixed-footer.png" alt="족장시대 핵심 흐름 및 하단 메뉴"/>
  <button class="footerHot fhome" onclick="showToast('홈 연결 준비')" aria-label="홈으로"></button>
  <button class="footerHot fall" onclick="showToast('전체 시대 Matrix 연결 준비')" aria-label="전체 시대 Matrix"></button>
  <button class="footerHot fhub" onclick="openSheet('hub')" aria-label="허브 탐험"></button>
  <button class="footerHot fprev" onclick="showToast('창조시대 Matrix 연결 준비')" aria-label="이전 창조시대 Matrix"></button>
  <button class="footerHot fnext" onclick="openSheet('exodus')" aria-label="다음 출애굽 광야 Matrix"></button>
</nav>

<div class="sheetBack" id="backdrop"></div>
<section class="sheet" id="sheet">
<div class="grab"></div><button class="close" id="close">×</button>
<h2 id="sheetTitle"></h2><div class="meta" id="sheetMeta"></div><p id="sheetBody"></p><div class="chips" id="chips"></div>
</section>
<div class="toast" id="toast"></div>

<script>
const DATA={
abraham:{title:'아브라함 연결탐험',meta:'창 12:1-3',body:'하나님이 한 사람을 부르셔서 언약 백성의 시작을 여십니다.',chips:['부르심','가나안','별 언약','믿음']},
isaac:{title:'이삭 연결탐험',meta:'창 22, 26장',body:'이삭은 약속의 아들이며 언약 계승의 통로입니다.',chips:['약속의 아들','모리아산','순종']},
jacob:{title:'야곱 연결탐험',meta:'창 28, 32장',body:'야곱은 벧엘에서 하나님을 만나고 얍복강에서 이스라엘이라는 새 이름을 받습니다.',chips:['벧엘','얍복강','이스라엘']},
joseph:{title:'요셉 연결탐험',meta:'창 37-50장',body:'요셉의 꿈과 고난은 애굽 총리라는 섭리의 자리로 이어집니다.',chips:['꿈','고난','총리','가족구원']},
egypt:{title:'애굽 정착 연결탐험',meta:'창 46-50장, 출 1장',body:'야곱의 가족은 고센에 정착하여 번성합니다.',chips:['고센','번성','출애굽 준비']},
covenant:{title:'언약의 흐름',meta:'아브라함 → 이삭 → 야곱 → 요셉',body:'족장시대의 핵심은 언약의 계승입니다.',chips:['언약','계승','구속사']},
providence:{title:'섭리 탐험',meta:'요셉의 꿈과 애굽',body:'하나님은 고난까지도 생명을 보존하는 길로 사용하십니다.',chips:['섭리','용서','보존']},
hub:{title:'족장시대 허브 탐험',meta:'5개 허브',body:'아브라함, 이삭, 야곱, 요셉, 애굽 정착 허브로 구성되어 있습니다.',chips:['아브라함','이삭','야곱','요셉','애굽정착']},
exodus:{title:'다음 시대',meta:'출애굽·광야 Matrix',body:'애굽 정착은 출애굽 시대를 준비합니다.',chips:['모세','출애굽','광야']}
};
const sheet=document.getElementById('sheet'),backdrop=document.getElementById('backdrop'),title=document.getElementById('sheetTitle'),meta=document.getElementById('sheetMeta'),body=document.getElementById('sheetBody'),chips=document.getElementById('chips'),toast=document.getElementById('toast');
function goHub(id){location.href='./hubs/index.html?hub='+encodeURIComponent(id)}
function openSheet(key){const d=DATA[key]||DATA.abraham;title.textContent=d.title;meta.textContent=d.meta;body.textContent=d.body;chips.innerHTML=d.chips.map(c=>`<span class="chip">${c}</span>`).join('');sheet.classList.add('show');backdrop.classList.add('show')}
function closeSheet(){sheet.classList.remove('show');backdrop.classList.remove('show')}
document.getElementById('close').onclick=closeSheet;backdrop.onclick=closeSheet;
function showToast(t){toast.textContent=t;toast.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>toast.classList.remove('show'),1200)}
if(new URLSearchParams(location.search).get('debug')==='1'){document.querySelectorAll('.hot').forEach(el=>el.classList.add('debug'))}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}
</script>
</div>
</body>
</html>
