<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>정복시대 Matrix</title>
<link rel="manifest" href="manifest.webmanifest"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<meta name="theme-color" content="#071017"/>
<link rel="stylesheet" href="style.css?v=20260606-ref-exodus-1"/>
</head>
<body>
<div class="app">
  <main class="phone main-content" id="mainContent">
    <section class="stage" id="stage" aria-label="정복시대 Matrix">
      <img class="bg" id="matrixBg" src="assets/conquest-bg-extended.png" alt="정복시대 배경" draggable="false"/>

      <div class="btnGroup g1">
        <button onclick="goHub('jordan')"><span class="bIcon">🌊</span>요단강 허브</button>
        <button onclick="openSheet('jordanFlow')"><span class="bIcon">⌖</span>연결탐험</button>
        <button onclick="openOriginal('jordan')"><span class="bIcon">▧</span>원본보기</button>
      </div>
      <div class="btnGroup g2">
        <button onclick="goHub('jericho')"><span class="bIcon">🏰</span>여리고 허브</button>
        <button onclick="openSheet('jerichoFlow')"><span class="bIcon">⌖</span>연결탐험</button>
        <button onclick="openOriginal('jericho')"><span class="bIcon">▧</span>원본보기</button>
      </div>
      <div class="btnGroup g3">
        <button onclick="goHub('conquest')"><span class="bIcon">⚔</span>가나안 허브</button>
        <button onclick="openSheet('conquestFlow')"><span class="bIcon">⌖</span>연결탐험</button>
        <button onclick="openOriginal('conquest')"><span class="bIcon">▧</span>원본보기</button>
      </div>
      <div class="btnGroup g4">
        <button onclick="goHub('inheritance')"><span class="bIcon">🗺</span>기업분배 허브</button>
        <button onclick="openSheet('inheritanceFlow')"><span class="bIcon">⌖</span>연결탐험</button>
        <button onclick="openOriginal('inheritance')"><span class="bIcon">▧</span>원본보기</button>
      </div>
      <div class="btnGroup g5">
        <button onclick="goHub('shechem')"><span class="bIcon">📜</span>세겜언약 허브</button>
        <button onclick="openSheet('shechemFlow')"><span class="bIcon">⌖</span>연결탐험</button>
        <button onclick="openOriginal('shechem')"><span class="bIcon">▧</span>원본보기</button>
      </div>
    </section>
  </main>

  <nav class="fixedFooter" aria-label="정복시대 하단 고정 메뉴">
    <div class="flowBox">
      <div class="flowTitle">정복시대 핵심흐름</div>
      <div class="flowItems"><span>요단강</span><b>›</b><span>여리고</span><b>›</b><span>정복</span><b>›</b><span>기업</span><b>›</b><span>세겜</span></div>
    </div>
    <div class="navGrid">
      <button onclick="showToast('홈 연결 준비')"><i>⌂</i><span>홈</span></button>
      <button onclick="showToast('전체 시대 Matrix 연결 준비')"><i>◎</i><span>전체</span></button>
      <button onclick="openSheet('hubList')"><i>▣</i><span>허브</span></button>
      <button onclick="showToast('출애굽·광야 Matrix 연결 준비')"><i>‹</i><span>이전</span></button>
      <button onclick="showToast('사사시대 Matrix 연결 준비')" class="next"><i>›</i><span>사사시대</span></button>
    </div>
  </nav>
</div>

<div class="sheetBack" id="backdrop"></div>
<section class="sheet" id="sheet" aria-modal="true" role="dialog">
  <div class="grab"></div><button class="close" id="close">×</button>
  <h2 id="sheetTitle"></h2><div class="meta" id="sheetMeta"></div><p id="sheetBody"></p><div class="chips" id="chips"></div>
</section>
<div class="toast" id="toast"></div>
<script src="script.js?v=20260606-ref-exodus-1"></script>
</body>
</html>
